name: docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - run: docker build --pull --no-cache --tag lmmartinb/satis:latest .
    - if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - if: github.ref == 'refs/heads/main'
      run: docker push lmmartinb/satis:latest
